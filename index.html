<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Hydra + Controles Audio</title>
  <link rel="icon" href="./favicon.svg" type="image/x-icon">  
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      background: black; 
      overflow: hidden; 
      font-family: sans-serif;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }
    
    /* Contenedor del reproductor */
    #audio-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #audio-container:hover { opacity: 1; }
    audio { width: 300px; height: 40px; }
    
    /* Botón de grabación */
    #record-btn {
      background: #333;
      border: 2px solid #fff;
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
      user-select: none;
      min-width: 100px;
    }
    #record-btn:hover {
      background: #444;
    }
    #record-btn.recording {
      background: #ff0000;
      border-color: #ff0000;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    #record-btn.recording::before {
      content: "● ";
      font-size: 16px;
    }

    #debugHUD {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.3;
      color: #0ff;
      background: rgba(0,0,0,0.6);
      padding: 8px 10px;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="audio-container">
  <audio id="main-audio" controls></audio>
  <button id="record-btn">Record</button>
</div>

<canvas id="hydra-canvas"></canvas>

<div id="debugHUD"></div>

<script src="./audio-config.js"></script>
<script src="https://unpkg.com/hydra-synth"></script>
<script src="./hydra.js"></script>
<script>
// ===================== GRABACIÓN DE VIDEO =====================
// canvas ya está declarado en hydra.js, solo obtenemos la referencia
const recordBtn = document.getElementById("record-btn");
const canvasElement = document.getElementById("hydra-canvas");
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

// ===================== CONFIGURACIÓN DE CALIDAD =====================
// Ajusta esta variable para controlar la calidad/bitrate de grabación:
// - 1.0 = Calidad máxima (bitrate muy alto, archivos grandes)
// - 0.5 = Calidad media (bitrate moderado, archivos más pequeños)
// - 0.75 = Calidad alta (balance calidad/tamaño)
const RECORDING_QUALITY_SCALE = 0.5; // <-- CAMBIA ESTA VARIABLE

// Obtener el stream del canvas
async function getCanvasStream() {
  // NO cambiar el canvas visible, solo capturar lo que hay
  const dpr = window.devicePixelRatio || 1;
  const width = Math.floor(window.innerWidth * dpr);
  const height = Math.floor(window.innerHeight * dpr);
  
  console.log(`🎬 Capturando canvas a resolución: ${width}x${height} (${(width * height / 1000000).toFixed(1)}Mpx)`);
  
  // Capturar a 30 FPS para evitar lag (60 FPS puede ser demasiado para el sistema)
  const stream = canvasElement.captureStream(30);
  
  // Asegurar que el stream tenga la configuración correcta
  const videoTrack = stream.getVideoTracks()[0];
  if (videoTrack) {
    const settings = videoTrack.getSettings();
    console.log(`📹 Stream configurado: ${settings.width}x${settings.height} @ ${settings.frameRate}fps`);
  }
  
  return stream;
}

// Iniciar grabación
async function startRecording() {
  try {
    // Ocultar elementos que no queremos capturar
    const debugHUD = document.getElementById("debugHUD");
    if (debugHUD) {
      debugHUD.style.display = "none";
    }
    
    const stream = await getCanvasStream();
    recordedChunks = [];
    
    // Iniciar el audio al mismo tiempo que la grabación para mantener sincronización
    const audioElement = document.getElementById("main-audio");
    if (audioElement && audioElement.paused) {
      audioElement.currentTime = 0; // Reiniciar desde el principio
      await audioElement.play().catch(err => {
        console.warn('No se pudo iniciar el audio automáticamente:', err);
      });
    }
    
    // Calcular bitrate basado en resolución y calidad configurada
    const dpr = window.devicePixelRatio || 1;
    const width = Math.floor(window.innerWidth * dpr);
    const height = Math.floor(window.innerHeight * dpr);
    const pixels = width * height;
    
    // Bitrate base: ~1.0 bits por pixel por frame a 30fps (reducido para evitar lag)
    // Para 1920x1080@2x = 3840x2160 = 8.3Mpx → ~25 Mbps base
    // Para 2560x1440@2x = 5120x2880 = 14.7Mpx → ~45 Mbps base
    // Límite máximo de 40 Mbps para evitar sobrecarga del sistema
    const baseBitrate = Math.min(40000000, Math.max(20000000, Math.floor(pixels * 1.0 * 30)));
    
    // Aplicar escala de calidad (sin cambiar resolución)
    const adaptiveBitrate = Math.floor(baseBitrate * RECORDING_QUALITY_SCALE);
    
    // Opciones para MediaRecorder - CALIDAD MÁXIMA
    const options = {
      mimeType: 'video/webm;codecs=vp9', // VP9 es mejor que VP8
      videoBitsPerSecond: adaptiveBitrate
    };
    
    // Fallback a VP8 si VP9 no está disponible
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      console.warn('⚠️ VP9 no disponible, usando VP8');
      options.mimeType = 'video/webm;codecs=vp8';
      // VP8 necesita aún más bitrate para la misma calidad
      options.videoBitsPerSecond = Math.floor(adaptiveBitrate * 1.5);
    }
    
    // Si ni VP9 ni VP8 están disponibles, usar webm básico
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      console.warn('⚠️ Solo WebM básico disponible');
      options.mimeType = 'video/webm';
      options.videoBitsPerSecond = Math.min(adaptiveBitrate, 50000000);
    }
    
    console.log(`🎥 Bitrate configurado: ${(options.videoBitsPerSecond / 1000000).toFixed(1)} Mbps`);
    console.log(`📐 Resolución de captura: ${width}x${height} (${(pixels / 1000000).toFixed(1)}Mpx)`);
    console.log(`   Escala de calidad: ${RECORDING_QUALITY_SCALE.toFixed(2)}x (bitrate base: ${(baseBitrate / 1000000).toFixed(1)} Mbps)`);
    
    mediaRecorder = new MediaRecorder(stream, options);
    
    // Manejar errores
    mediaRecorder.onerror = (event) => {
      console.error('Error en MediaRecorder:', event.error);
      if (isRecording) {
        stopRecording();
        alert('❌ Error durante la grabación: ' + (event.error?.message || 'Error desconocido'));
      }
    };
    
    // Monitorear tamaño de chunks (sin descartar para evitar corrupción)
    let totalChunksSize = 0;
    
    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
        totalChunksSize += event.data.size;
        
        // Log cada 10 chunks para monitorear (sin límite de memoria)
        if (recordedChunks.length % 10 === 0) {
          console.log(`📦 Chunks: ${recordedChunks.length}, Tamaño total: ${(totalChunksSize / 1024 / 1024).toFixed(1)} MB`);
        }
      }
    };
    
    mediaRecorder.onstop = async () => {
      console.log(`💾 Finalizando grabación: ${recordedChunks.length} chunks, ${(totalChunksSize / 1024 / 1024).toFixed(1)} MB`);
      
      // Crear blob con todos los chunks (en orden correcto)
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      
      // Verificar que el blob tenga tamaño correcto
      if (blob.size === 0) {
        console.error('❌ Error: El blob está vacío');
        alert('❌ Error: El video grabado está vacío. Intenta grabar de nuevo.');
        return;
      }
      
      console.log(`📦 Blob creado: ${(blob.size / 1024 / 1024).toFixed(1)} MB`);
      
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `hydra_recording_${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
      document.body.appendChild(a);
      a.click();
      
      // Esperar un poco antes de limpiar para asegurar que la descarga se inició
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        console.log('✅ Video guardado:', a.download);
      }, 100);
    };
    
    // Capturar chunks con frecuencia moderada para evitar lag
    // Timeslice más grande reduce la carga del sistema
    mediaRecorder.start(1000); // Capturar chunks cada 1 segundo (reduce carga) 
    isRecording = true;
    recordBtn.textContent = "Recording";
    recordBtn.classList.add("recording");
    
    console.log('🎬 Grabación iniciada:', {
      mimeType: options.mimeType,
      bitrate: `${(options.videoBitsPerSecond / 1000000).toFixed(1)} Mbps`,
      resolution: `${width}x${height}`,
      fps: 30,
      timeslice: '1000ms'
    });
    
  } catch (error) {
    console.error('❌ Error al iniciar grabación:', error);
    alert('❌ Error al iniciar grabación: ' + error.message);
  }
}

// Detener grabación
function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    recordBtn.textContent = "Record";
    recordBtn.classList.remove("recording");
    
    // Restaurar elementos ocultos
    const debugHUD = document.getElementById("debugHUD");
    if (debugHUD) {
      debugHUD.style.display = "block";
    }
    
    // Pausar el audio también
    const audioElement = document.getElementById("main-audio");
    if (audioElement && !audioElement.paused) {
      audioElement.pause();
    }
  }
}

// Cancelar grabación (guardar hasta donde se canceló)
function cancelRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop(); // Esto guardará lo grabado hasta ahora
    isRecording = false;
    recordBtn.textContent = "Record";
    recordBtn.classList.remove("recording");
    
    // Restaurar elementos ocultos
    const debugHUD = document.getElementById("debugHUD");
    if (debugHUD) {
      debugHUD.style.display = "block";
    }
    
    // Pausar el audio también
    const audioElement = document.getElementById("main-audio");
    if (audioElement && !audioElement.paused) {
      audioElement.pause();
    }
  }
}

// Event listeners
recordBtn.addEventListener('click', () => {
  if (!isRecording) {
    startRecording();
  } else {
    // Detener directamente sin confirmación
    stopRecording();
  }
});

// Permitir cancelar con Escape (también guarda lo grabado)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isRecording) {
    cancelRecording();
  }
});

// Detener grabación automáticamente cuando termine el audio
const audioElement = document.getElementById("main-audio");
if (audioElement) {
  audioElement.addEventListener('ended', () => {
    if (isRecording) {
      stopRecording();
    }
  });
}
</script>
</body>
</html>
