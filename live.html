<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Hydra — Live (audio en tiempo real)</title>
  <link rel="icon" href="./favicon.svg" type="image/x-icon">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }
    #live-controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(6px);
    }
    #live-mic-btn {
      background: #1a3d2e;
      border: 2px solid #3ecf8e;
      color: #e8fff4;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s, opacity 0.2s;
    }
    #live-mic-btn:hover:not(:disabled) {
      background: #245a42;
    }
    #live-mic-btn:disabled {
      opacity: 0.65;
      cursor: default;
    }
    #live-mic-status {
      color: #aaa;
      font-size: 12px;
      max-width: 320px;
      text-align: center;
      line-height: 1.35;
    }
    /* Tecla R en live: solo canvas (ver hydra_live.js) */
    body.live-chrome-hidden #live-controls,
    body.live-chrome-hidden #debugHUD {
      display: none !important;
    }

    #debugHUD {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.3;
      color: #0ff;
      background: rgba(0,0,0,0.6);
      padding: 8px 10px;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="live-controls">
  <button type="button" id="live-mic-btn">Activar entrada de audio</button>
  <p id="live-mic-status">El navegador pedirá permiso para el micrófono / entrada. Elige el dispositivo que use ASIO4ALL en el sistema si el navegador lo lista.</p>
</div>

<canvas id="hydra-canvas"></canvas>
<div id="debugHUD"></div>

<script src="./audio-config.js"></script>
<script src="https://unpkg.com/hydra-synth"></script>
<script src="./hydra-shared.js"></script>
<script src="./hydra_live.js"></script>
</body>
</html>
